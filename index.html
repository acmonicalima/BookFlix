<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookflix</title>
  <style>

.etiqueta-destaque {
    position: absolute;
    top: 8px;
    left: 8px;
    background-color: red;
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    font-size: 12px;
    border-radius: 4px;
    z-index: 10;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
  }

  .card {
    position: relative; /* Necessário pra posicionar a etiqueta */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #141414;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 20px 10px 10px;
  }

  .logo {
    width: 150px;
    border-radius: 10px;
  }
  
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #141414;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 20px 10px 10px;
    }

    .logo {
      width: 150px;
      border-radius: 10px;
    }

    .slogan {
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .school {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 10px;
    }

    .frase {
      background-color: #222;
      padding: 10px;
      font-style: italic;
      font-size: 1rem;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main {
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    form {
      max-width: 300px;
      margin: 20px auto;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    form input, form select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    form button {
      width: 100%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }

    form a {
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }

    form a:hover {
      color: #e50914;
    }

    .livros {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      height: 280px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .card .sinopse {
      font-size: 0.9rem;
      color: #ccc;
    }

    .card .estoque {
      font-size: 0.9rem;
      margin: 5px 0;
    }

    .card button {
      width: 48%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-emprestar { background-color: #e50914; color: white; }
    .btn-devolver { background-color: #444; color: white; }

    footer {
      text-align: center;
      font-size: 0.9rem;
      color: #aaa;
      padding: 20px 10px;
      background: #0d0d0d;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .card img { height: 200px; }
    }

    /* Destaque visual para livros destacados */
.livro[data-destaque="true"] {
  border: 3px solid #e50914;
  box-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
  transform: scale(1.02);
  transition: all 0.3s ease-in-out;
  background-color: rgba(255, 0, 0, 0.05);
}
  </style>
</head>
<body>
  <header>

    <img src="imagens/logobookflix.JPG" class="logo" alt="Logo Bookflix" />
    <div class="slogan">Maratonando Livros</div>
    <div class="school">CIEP BRIZOLÃO 183 - JOÃO VITTA</div>
    <div class="frase" id="frase"></div>

    <div class="container-voltar">
      <button onclick="voltar()" class="btn-voltar">Voltar</button>
  </div>
  </header>

  <main>
    <!-- Login -->
    <section id="login">
      <form onsubmit="event.preventDefault(); fazerLogin()">
        <h2>Login</h2>
        <input type="text" id="loginNome" placeholder="Nome completo" required />
        <input type="date" id="loginNascimento" required />
        <button type="submit">Entrar</button>
        <p style="text-align:center; margin-top:10px;">
          <a onclick="mostrarCadastro()">Não tem cadastro? Clique aqui</a>
        </p>
      </form>
    </section>

    <!-- Cadastro -->
    <section id="cadastro" class="hidden">
      <form onsubmit="event.preventDefault(); fazerCadastro()">
        <h2>Cadastro</h2>
        <input type="text" id="cadNome" placeholder="Nome completo" required />
        <input type="date" id="cadNascimento" required />
        <select id="cadTipo" required>
          <option value="">Você é...</option>
          <option value="aluno">Aluno</option>
          <option value="professor">Professor</option>
          <option value="admin">Administrador</option>
        </select>
        <button type="submit">Cadastrar</button>
        <p style="text-align:center; margin-top:10px;">
          <a onclick="mostrarLogin()">Já tem cadastro? Voltar ao login</a>
        </p>
      </form>
    </section>

    <!-- Livros -->
    <section id="vitrine" class="hidden">
      <h2 style="text-align:center;">Livros disponíveis</h2>
      <div class="livros" id="livrosContainer"></div>
    </section>
  </main>

  <footer>
    © 2025 Mônica Lima<br/>
    Animação Cultural
  </footer>



  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBDx8P3EBS_PxulDBGLG03JYBztx2NsvXY",
      authDomain: "bookflix-72bf6.firebaseapp.com",
      databaseURL: "https://bookflix-72bf6-default-rtdb.firebaseio.com",
      projectId: "bookflix-72bf6",
      storageBucket: "bookflix-72bf6.firebasestorage.app",
      messagingSenderId: "942375721594",
      appId: "1:942375721594:web:95fcf3c05e5b7aeb3279c3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Mostrar seções
    function mostrarCadastro() {
      document.getElementById('login-section').classList.remove('active');
      document.getElementById('cadastro-section').classList.add('active');
    }

    function mostrarLogin() {
      document.getElementById('cadastro-section').classList.remove('active');
      document.getElementById('login-section').classList.add('active');
    }

    function mostrarCamposExtras() {
      const tipo = document.getElementById('cadTipo').value;
      const campo = document.getElementById('campoExtra');
      if (tipo === "aluno") campo.placeholder = "Turma";
      else if (tipo === "professor") campo.placeholder = "Disciplina";
      else if (tipo === "admin") campo.placeholder = "Senha do cargo";
      campo.style.display = tipo ? 'block' : 'none';
    }

    // Cadastro
    async function cadastrar() {
      const nome = document.getElementById('cadNome').value;
      const nascimento = document.getElementById('cadNascimento').value;
      const tipo = document.getElementById('cadTipo').value;
      const extra = document.getElementById('campoExtra').value;

      if (!nome || !nascimento || !tipo) {
        alert("Preencha todos os campos.");
        return;
      }

      const senha = tipo === "admin" ? extra : nascimento;

      await db.collection("usuarios").add({
        nome, nascimento, tipo, senha, extra
      });

      alert("Cadastro realizado com sucesso!");
      mostrarLogin();
    }

    // Login
    async function fazerLogin() {
      const nome = document.getElementById('loginNome').value;
      const nascimento = document.getElementById('loginDataNascimento').value;
      const tipo = document.getElementById('loginTipo').value;

      if (!nome || !nascimento || !tipo) {
        alert("Preencha todos os campos!");
        return;
      }

      const senha = tipo === "admin" ? tipo : nascimento;

      const query = await db.collection("usuarios")
        .where("nome", "==", nome)
        .where("senha", "==", senha)
        .where("tipo", "==", tipo)
        .get();

      if (!query.empty) {
        document.getElementById("login-section").classList.remove("active");
        document.getElementById("livros-section").classList.add("active");
        carregarLivros();
      } else {
        alert("Usuário não encontrado ou dados incorretos.");
      }
    }

    // Carregar livros
    async function carregarLivros() {
      const container = document.getElementById("livrosContainer");
      container.innerHTML = "";

      const livros = await db.collection("livros").get();
      livros.forEach(doc => {
        const livro = doc.data();
        const div = document.createElement("div");
        div.classList.add("book-card");
        if (livro.destaque) div.classList.add("highlight");

        div.innerHTML = `
          <img src="${livro.capa}" alt="${livro.nome}">
          <div class="book-info">
            <h4>${livro.nome}</h4>
            <p><strong>Autor:</strong> ${livro.autor}</p>
            <p>${livro.sinopse}</p>
            <p><strong>Estoque:</strong> ${livro.estoque}</p>
            <button onclick="emprestar('${doc.id}', ${livro.estoque})">Emprestar</button>
            <button onclick="devolver('${doc.id}', ${livro.estoque})">Devolver</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Emprestar livro
    async function emprestar(id, estoque) {
      if (estoque <= 0) {
        alert("Livro esgotado!");
        return;
      }
      await db.collection("livros").doc(id).update({
        estoque: estoque - 1
      });
      carregarLivros();
    }

    // Devolver livro
    async function devolver(id, estoque) {
      await db.collection("livros").doc(id).update({
        estoque: estoque + 1
      });
      carregarLivros();
    }

    function logout() {
      location.reload();
    }
  </script>
</body>
</html>
