<body>

<img src="https://raw.githubusercontent.com/acmonicalima/bookflix/main/logobookflix.jpeg" alt="Logo Bookflix" class="logo">

<div class="container">
  <h1>Login / Cadastro</h1>

  <!-- Formulário de login -->
  <div id="loginForm">
    <input type="text" id="loginName" placeholder="Nome" required>
    <input type="date" id="loginDob" required>
    <button onclick="loginUser()">Entrar</button>
    <p>Não tem uma conta? <a href="javascript:void(0)" onclick="showRegisterForm()">Cadastre-se</a></p>
    <p class="error" id="loginError"></p>
  </div>

  <!-- Formulário de cadastro -->
  <div id="registerForm" style="display:none;">
    <input type="text" id="registerName" placeholder="Nome" required>
    <input type="date" id="registerDob" required>
    <select id="userType">
      <option value="aluno">Aluno</option>
      <option value="professor">Professor</option>
      <option value="administrador">Administrador</option>
    </select>
    <button onclick="registerUser()">Cadastrar</button>
    <p>Já tem uma conta? <a href="javascript:void(0)" onclick="showLoginForm()">Faça login</a></p>
    <p class="error" id="registerError"></p>
  </div>
</div>

<!-- Vitrine de Livros -->
<div class="vitrine" id="livrosVitrine" style="display:none;">
  <h1>Vitrine de Livros</h1>
  <div id="loadingSpinner" class="spinner" style="display:none;"></div>
</div>

<script type="module">
  import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const db = getFirestore();
const colecaoEmprestimos = collection(db, "emprestimos");

// Supondo que você já tenha o nome do usuário logado salvo em:
let usuarioLogado = sessionStorage.getItem("usuarioLogado"); // ou como preferir

// Função para verificar quantos livros o usuário tem emprestados
async function contarEmprestimosAtivos(usuario) {
  const q = query(colecaoEmprestimos, where("usuario", "==", usuario));
  const querySnapshot = await getDocs(q);
  return querySnapshot.size;
}

// Função para emprestar um livro
async function emprestarLivro(livroId, livroNome) {
  if (!usuarioLogado) {
    alert("Você precisa estar logado para emprestar um livro.");
    return;
  }

  const emprestimosAtuais = await contarEmprestimosAtivos(usuarioLogado);
  if (emprestimosAtuais >= 2) {
    alert("Você já tem 2 livros emprestados. Devolva um antes de pegar outro.");
    return;
  }

  const dataAtual = new Date();
  const emprestimo = {
    usuario: usuarioLogado,
    livroId: livroId,
    livroNome: livroNome,
    dataEmprestimo: dataAtual.toISOString(),
    diasRestantes: 15,
    renovado: false
  };

  await addDoc(colecaoEmprestimos, emprestimo);
  atualizarEstoque(livroId, -1);
  alert(`Livro "${livroNome}" emprestado com sucesso!`);
}

// Função para devolver um livro
async function devolverLivro(livroId) {
  const q = query(colecaoEmprestimos, where("usuario", "==", usuarioLogado), where("livroId", "==", livroId));
  const querySnapshot = await getDocs(q);
  if (querySnapshot.empty) {
    alert("Você não tem esse livro emprestado.");
    return;
  }

  querySnapshot.forEach(async (docSnap) => {
    await deleteDoc(doc(db, "emprestimos", docSnap.id));
    atualizarEstoque(livroId, +1);
    alert("Livro devolvido com sucesso!");
  });
}

// Função para renovar o empréstimo
async function renovarEmprestimo(livroId) {
  const q = query(colecaoEmprestimos, where("usuario", "==", usuarioLogado), where("livroId", "==", livroId));
  const querySnapshot = await getDocs(q);

  if (!querySnapshot.empty) {
    const docSnap = querySnapshot.docs[0];
    const dados = docSnap.data();

    if (dados.renovado) {
      alert("Este livro já foi renovado uma vez.");
      return;
    }

    const docRef = doc(db, "emprestimos", docSnap.id);
    await updateDoc(docRef, {
      diasRestantes: dados.diasRestantes + 15,
      renovado: true
    });

    alert("Renovação feita com sucesso. +15 dias!");
  }
}

// Atualizar estoque do livro (exemplo: -1 ou +1)
async function atualizarEstoque(livroId, valor) {
  const livroRef = doc(db, "livros", livroId);
  const livroSnap = await getDoc(livroRef);
  if (livroSnap.exists()) {
    const estoqueAtual = livroSnap.data().estoque || 0;
    await updateDoc(livroRef, { estoque: estoqueAtual + valor });
  }
}

// Exibir contador de dias restantes (chamar após carregar a vitrine)
async function exibirContadorDiasRestantes() {
  const q = query(colecaoEmprestimos, where("usuario", "==", usuarioLogado));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach((docSnap) => {
    const emprestimo = docSnap.data();
    const dataEmprestimo = new Date(emprestimo.dataEmprestimo);
    const hoje = new Date();
    const diasPassados = Math.floor((hoje - dataEmprestimo) / (1000 * 60 * 60 * 24));
    const diasRestantes = Math.max(0, emprestimo.diasRestantes - diasPassados);

    // Exibe os dias restantes de forma simples no console (ou você pode atualizar no HTML)
    console.log(`Livro "${emprestimo.livroNome}": ${diasRestantes} dias restantes`);
  });
}

// Exemplo de uso: (você adapta pros botões)
document.getElementById("btnEmprestarMalala").addEventListener("click", () => emprestarLivro("MALALA", "Malala"));
document.getElementById("btnDevolverMalala").addEventListener("click", () => devolverLivro("MALALA"));
document.getElementById("btnRenovarMalala").addEventListener("click", () => renovarEmprestimo("MALALA"));
</script>


</body>
