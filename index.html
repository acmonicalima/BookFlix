<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookflix</title>
  <style>

  header {

  .logo {
    width: 150px;

  }
  
    * { margin: 0; padding: 0; box-sizing: border-box; }

      font-family: 'Segoe UI', sans-serif;
      background-color: #141414;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 20px 10px 10px;
    }

    .logo {
      width: 150px;
      border-radius: 10px;
    }

    .slogan {
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .school {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 10px;
    }

    .frase {
      background-color: #222;
      padding: 10px;
      font-style: italic;
      font-size: 1rem;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main {
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    form {
      max-width: 300px;
      margin: 20px auto;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    form input, form select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    form button {
      width: 100%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }

    form a {
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }

    form a:hover {
      color: #e50914;
    }

        }
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
            margin-bottom: 40px;
        }
        .livro {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .livro:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }
        .livro img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .livro p {
            padding: 10px;
            font-size: 14px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
        .livro .button {
            background-color: #e50914;
            padding: 12px;
            margin: 5px;
            width: 90%;
            border: none;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .livro .button:hover {
            background-color: #b81d16;
        }
        .form-link {
            color: #e50914;
            text-decoration: none;
            font-weight: bold;
        }
        .form-link:hover {
            color: #b81d16;
        }
    </style>
</head>
<body>

<img src="https://raw.githubusercontent.com/acmonicalima/bookflix/main/logobookflix.jpeg" alt="Logo Bookflix" class="logo">

<div class="container">
    <h1>Bookflix</h1>
  <!-- Formulário de login -->
  <div id="loginForm">
    <input type="text" id="loginName" placeholder="Nome" required>
    <input type="date" id="loginDob" required>
    <button onclick="loginUser()">Entrar</button>
    <p>Não tem uma conta? <a href="javascript:void(0)" onclick="showRegisterForm()">Cadastre-se</a></p>
    <p class="error" id="loginError"></p>
  </div>

  <!-- Formulário de cadastro -->
  <div id="registerForm" style="display:none;">
    <input type="text" id="registerName" placeholder="Nome" required>
    <input type="date" id="registerDob" required>
    <select id="userType">
      <option value="aluno">Aluno</option>
      <option value="professor">Professor</option>
      <option value="administrador">Administrador</option>
    </select>
    <button onclick="registerUser()">Cadastrar</button>
    <p>Já tem uma conta? <a href="javascript:void(0)" onclick="showLoginForm()">Faça login</a></p>
    <p class="error" id="registerError"></p>
  </div>
</div>

<!-- Vitrine de Livros -->
<div class="vitrine" id="livrosVitrine" style="display:none;">
  <h1>Vitrine de Livros</h1>
  <div id="loadingSpinner" class="spinner" style="display:none;"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.1.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAphtPredq1GUdCroaxJe9eyWRfLy27mpE",
    authDomain: "bookflix-39406.firebaseapp.com",
    projectId: "bookflix-39406",
    storageBucket: "bookflix-39406.appspot.com",
    messagingSenderId: "222500839972",
    appId: "1:222500839972:web:50f8eb1c7785cdbada2eb1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.showRegisterForm = function () {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  };

  window.showLoginForm = function () {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
  };

  window.loginUser = async function () {
    const name = document.getElementById('loginName').value;
    const dob = document.getElementById('loginDob').value;

    if (!name || !dob) {
      document.getElementById('loginError').innerText = "Por favor, preencha todos os campos!";
      return;
    }

    // Consulta para buscar usuário pelo nome e data de nascimento
    const usersRef = collection(db, "users");
    const q = query(usersRef, where("name", "==", name), where("dob", "==", dob));
    
    try {
      const querySnapshot = await getDocs(q);
      if (!querySnapshot.empty) {
        alert("Login bem-sucedido!");
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('livrosVitrine').style.display = 'block';
        loadBooks();
      } else {
        document.getElementById('loginError').innerText = "Usuário não encontrado.";
      }
    } catch (error) {
      document.getElementById('loginError').innerText = "Erro ao buscar usuário: " + error.message;
    }
  };

  window.registerUser = async function () {
    const name = document.getElementById('registerName').value;
    const dob = document.getElementById('registerDob').value;
    const userType = document.getElementById('userType').value;

    if (!name || !dob || !userType) {
      document.getElementById('registerError').innerText = 'Preencha todos os campos';
      return;
    }

    // Remove espaços e deixa o nome minúsculo para criar um "email" válido
    const safeName = name.toLowerCase().replace(/\s+/g, '');
    const email = safeName + '@bookflix.com';
    const password = userType === 'administrador' ? 'adminPassword' : dob;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await addDoc(collection(db, 'users'), {
        name: name,
        dob: dob,
        type: userType,
        uid: user.uid
      });

      alert("Cadastro realizado com sucesso!");
      showLoginForm();
    } catch (error) {
      document.getElementById('registerError').innerText = error.message;
    }
  };

  async function loadBooks() {
    document.getElementById('loadingSpinner').style.display = 'block';
    const livrosRef = collection(db, 'livros');
    const snapshot = await getDocs(livrosRef);
    const livrosContainer = document.getElementById('livrosVitrine');

    snapshot.forEach((doc) => {
      const livroData = doc.data();
      const livroElement = document.createElement('div');
      livroElement.classList.add('livro');
      livroElement.innerHTML = `
        <img src="${livroData.capa}" alt="${livroData.nome}">
        <p>${livroData.nome}</p>
        <button class="button">Emprestar</button>
      `;
      livrosContainer.appendChild(livroElement);
    });

    document.getElementById('loadingSpinner').style.display = 'none';
  }
</script>


</body>
</html>
