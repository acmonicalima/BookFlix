<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookflix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin: 20px 0;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Estilo do login */
        #loginForm, #registerForm {
            display: none;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-sizing: border-box;
        }
        #loginForm input, #registerForm input {
            padding: 10px;
            margin-bottom: 10px;
            width: 100%;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: white;
        }
        #loginForm button, #registerForm button {
            padding: 10px;
            background-color: #e50914;
            border: none;
            width: 100%;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        #loginForm button:hover, #registerForm button:hover {
            background-color: #f40612;
        }
        .vitrine {
            display: none;
            margin-top: 20px;
        }
        /* Carrossel de livros */
        .livros-carrossel {
            display: flex;
            overflow-x: scroll;
            gap: 20px;
            justify-content: center;
        }
        .livro {
            width: 200px;
            height: 300px;
            background-color: #333;
            border-radius: 8px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            display: inline-block;
        }
        .livro img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .livro p {
            margin-top: 10px;
            font-size: 1rem;
        }
        .livro button {
            padding: 8px;
            background-color: #e50914;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .livro button:hover {
            background-color: #f40612;
        }
        /* Ajustes do botão Admin */
        #adminButton {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #e50914;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 4px;
        }
        #adminButton:hover {
            background-color: #f40612;
        }
    </style>
</head>
<body>
    <!-- Botão Admin -->
    <button id="adminButton" onclick="verificarAdmin()">Área Administrativa</button>

    <!-- Tela de Login -->
    <div id="loginForm">
        <h1>Login</h1>
        <input type="text" id="loginName" placeholder="Nome" required>
        <input type="date" id="loginDob" required>
        <button onclick="loginUser()">Entrar</button>
        <p id="loginError" style="color:red;"></p>
        <p><a href="#" onclick="showRegisterForm()">Cadastrar-se</a></p>
    </div>

    <!-- Tela de Cadastro -->
    <div id="registerForm">
        <h1>Cadastro</h1>
        <input type="text" id="registerName" placeholder="Nome" required>
        <input type="date" id="registerDob" required>
        <select id="userType">
            <option value="aluno">Aluno</option>
            <option value="professor">Professor</option>
            <option value="administrador">Administrador</option>
        </select>
        <button onclick="registerUser()">Cadastrar</button>
        <p id="registerError" style="color:red;"></p>
        <p><a href="#" onclick="showLoginForm()">Já tenho uma conta</a></p>
    </div>

    <!-- Vitrine de Livros -->
    <div class="vitrine" id="livrosVitrine">
        <h1>Vitrine de Livros</h1>
        <div id="loadingSpinner" class="spinner" style="display:none;">Carregando...</div>
        <div class="livros-carrossel" id="livrosContainer"></div>
    </div>

    <script>
        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        async function loginUser() {
            const name = document.getElementById('loginName').value;
            const dob = document.getElementById('loginDob').value;

            if (!name || !dob) {
                document.getElementById('loginError').innerText = "Por favor, preencha todos os campos!";
                return;
            }

            const usersRef = firebase.firestore().collection("users");
            const snapshot = await usersRef.where("name", "==", name).where("dob", "==", dob).get();

            if (!snapshot.empty) {
                alert("Login bem-sucedido!");
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('livrosVitrine').style.display = 'block';
                loadBooks();
            } else {
                document.getElementById('loginError').innerText = "Usuário não encontrado.";
            }
        }

        async function registerUser() {
            const name = document.getElementById('registerName').value;
            const dob = document.getElementById('registerDob').value;
            const userType = document.getElementById('userType').value;

            if (!name || !dob || !userType) {
                document.getElementById('registerError').innerText = 'Preencha todos os campos';
                return;
            }

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(name + '@bookflix.com', dob);
                const user = userCredential.user;

                await firebase.firestore().collection('users').add({
                    name: name,
                    dob: dob,
                    type: userType,
                    uid: user.uid
                });

                alert("Cadastro realizado com sucesso!");
                showLoginForm();
            } catch (error) {
                document.getElementById('registerError').innerText = error.message;
            }
        }

        async function loadBooks() {
            const livrosRef = firebase.firestore().collection('livros');
            const snapshot = await livrosRef.get();
            const livrosContainer = document.getElementById('livrosContainer');

            snapshot.forEach((doc) => {
                const livroData = doc.data();
                const livroElement = document.createElement('div');
                livroElement.classList.add('livro');
                livroElement.innerHTML = `
                    <img src="${livroData.capa}" alt="${livroData.nome}">
                    <p>${livroData.nome}</p>
                    <button class="button">Emprestar</button>
                `;
                livrosContainer.appendChild(livroElement);
            });
        }

        // Função para verificar se o usuário é admin
        function verificarAdmin() {
            const user = firebase.auth().currentUser;

            if (user) {
                firebase.firestore().collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            const usuario = doc.data();
                            if (usuario.type === 'administrador') {
                                alert("Bem-vindo, Administrador!");
                                // Aqui você pode redirecionar ou mostrar funcionalidades exclusivas
                            } else {
                                alert("Usuário comum.");
                            }
                        } else {
                            alert("Usuário não encontrado.");
                        }
                    })
                    .catch((error) => {
                        console.error("Erro ao verificar dados do usuário: ", error);
                    });
            } else {
                alert("Usuário não logado.");
            }
        }
    </script>
</body>
</html>
