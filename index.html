<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookflix - Login / Cadastro</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #141414;
        color: #fff;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
        background-color: #222;
        border-radius: 8px;
        margin-top: 50px;
    }
    h1 {
        text-align: center;
        font-size: 24px;
    }
    .logo {
        display: block;
        margin: 0 auto 20px;
        max-width: 100%;
        height: auto;
    }
    input, select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        background-color: #333;
        color: white;
        border: 1px solid #444;
        border-radius: 4px;
    }
    button {
        width: 100%;
        padding: 10px;
        background-color: #e50914;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    button:hover {
        background-color: #b81d16;
    }
    .error {
        color: red;
        text-align: center;
    }
    .vitrine {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
    }
    .livro {
        background-color: #222;
        width: 150px;
        margin: 10px;
        border-radius: 8px;
        overflow: hidden;
        text-align: center;
        color: #fff;
    }
    .livro img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
    .livro p {
        padding: 10px;
        font-size: 14px;
    }
    .livro .button {
        background-color: #e50914;
        padding: 10px;
        margin: 5px;
        width: 90%;
        border: none;
        color: white;
        cursor: pointer;
    }
    .livro .button:hover {
        background-color: #b81d16;
    }
    /* Carrossel */
    .carrossel-container {
        position: relative;
        width: 100%;
        overflow: hidden;
    }
    .carrossel {
        display: flex;
        transition: transform 0.5s ease-in-out;
    }
    .livro {
        flex: 0 0 auto;
        width: 200px;
    }
    .carrossel-button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(0, 0, 0, 0.5);
        border: none;
        color: white;
        padding: 10px;
        cursor: pointer;
        z-index: 10;
    }
    .carrossel-button-left {
        left: 10px;
    }
    .carrossel-button-right {
        right: 10px;
    }
  </style>
</head>
<body>
  <!-- Criar Admin Button -->
  <button onclick="adicionarAdministrador()" style="position: fixed; top: 20px; right: 20px; background-color: #e50914; padding: 10px; border-radius: 4px; color: white;">Criar Admin</button>

  <!-- Logo -->
  <img src="https://raw.githubusercontent.com/acmonicalima/bookflix/main/logobookflix.jpeg" alt="Logo Bookflix" class="logo">

  <!-- Container Login / Cadastro -->
  <div class="container">
    <h1>Login / Cadastro</h1>

    <!-- Formulário de login -->
    <div id="loginForm">
      <input type="text" id="loginName" placeholder="Nome" required>
      <input type="date" id="loginDob" required>
      <button onclick="loginUser()">Entrar</button>
      <p>Não tem uma conta? <a href="javascript:void(0)" onclick="showRegisterForm()">Cadastre-se</a></p>
      <p class="error" id="loginError"></p>
    </div>

    <!-- Formulário de cadastro -->
    <div id="registerForm" style="display:none;">
      <input type="text" id="registerName" placeholder="Nome" required>
      <input type="date" id="registerDob" required>
      <select id="userType">
        <option value="aluno">Aluno</option>
        <option value="professor">Professor</option>
        <option value="administrador">Administrador</option>
      </select>
      <button onclick="registerUser()">Cadastrar</button>
      <p>Já tem uma conta? <a href="javascript:void(0)" onclick="showLoginForm()">Faça login</a></p>
      <p class="error" id="registerError"></p>
    </div>
  </div>

  <!-- Vitrine de Livros com Carrossel -->
  <div class="vitrine" id="livrosVitrine" style="display:none;">
    <h1>Vitrine de Livros</h1>
    <div id="loadingSpinner" class="spinner" style="display:none;"></div>

    <div class="carrossel-container">
      <button class="carrossel-button carrossel-button-left" onclick="moveCarrossel(-1)">&#10094;</button>
      <div id="livrosCarrossel" class="carrossel"></div>
      <button class="carrossel-button carrossel-button-right" onclick="moveCarrossel(1)">&#10095;</button>
    </div>
  </div>

  <!-- Configuração Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.1.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAphtPredq1GUdCroaxJe9eyWRfLy27mpE",
      authDomain: "bookflix-39406.firebaseapp.com",
      projectId: "bookflix-39406",
      storageBucket: "bookflix-39406.appspot.com",
      messagingSenderId: "222500839972",
      appId: "1:222500839972:web:50f8eb1c7785cdbada2eb1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Funções de login e cadastro
    window.showRegisterForm = function () {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    };

    window.showLoginForm = function () {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    };

    window.loginUser = async function () {
      const name = document.getElementById('loginName').value;
      const dob = document.getElementById('loginDob').value;
      if (!name || !dob) {
        document.getElementById('loginError').innerText = "Por favor, preencha todos os campos!";
        return;
      }

      const usersRef = collection(db, "users");
      const q = query(usersRef, where("name", "==", name), where("dob", "==", dob));
      try {
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) {
          alert("Login bem-sucedido!");
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('livrosVitrine').style.display = 'block';
          loadBooks();
        } else {
          document.getElementById('loginError').innerText = "Usuário não encontrado.";
        }
      } catch (error) {
        document.getElementById('loginError').innerText = "Erro ao buscar usuário: " + error.message;
      }
    };

    window.registerUser = async function () {
      const name = document.getElementById('registerName').value;
      const dob = document.getElementById('registerDob').value;
      const userType = document.getElementById('userType').value;

      if (!name || !dob || !userType) {
        document.getElementById('registerError').innerText = 'Preencha todos os campos';
        return;
      }

      const safeName = name.toLowerCase().replace(/\s+/g, '');
      const safeDob = dob.replace(/\D/g, ''); // Remove todos caracteres não numéricos
      try {
        await addDoc(collection(db, "users"), {
          name: safeName,
          dob: safeDob,
          userType: userType,
        });
        alert('Usuário cadastrado com sucesso!');
        showLoginForm();
      } catch (e) {
        document.getElementById('registerError').innerText = "Erro ao cadastrar: " + e.message;
      }
    };

    window.adicionarAdministrador = function () {
      const name = prompt('Nome do novo administrador:');
      const dob = prompt('Data de nascimento do administrador:');
      if (name && dob) {
        addDoc(collection(db, "users"), {
          name: name,
          dob: dob,
          userType: "administrador",
        }).then(() => {
          alert("Administrador criado com sucesso.");
        }).catch((error) => {
          alert("Erro ao criar administrador: " + error.message);
        });
      } else {
        alert('Nome e data de nascimento são obrigatórios!');
      }
    };

    function loadBooks() {
      // Implementar o código para carregar os livros aqui
    }

    function moveCarrossel(direction) {
      const carrossel = document.getElementById('livrosCarrossel');
      const carrosselWidth = carrossel.offsetWidth;
      carrossel.style.transform = `translateX(${parseInt(carrossel.style.transform.replace('translateX(', '').replace('px)', '')) + direction * carrosselWidth}px)`;
    }
  </script>
</body>
</html>
