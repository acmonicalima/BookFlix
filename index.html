<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookflix</title>
    <style>
        /* Estilo visual inspirado na Netflix */
        body {
            background-color: #141414;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background-color: #141414;
            padding: 10px 20px;
            text-align: center;
        }

        header h1 {
            color: #e50914;
        }

        .livros-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 20px 0;
        }

        .livro {
            width: 200px;
            margin-right: 10px;
            background-color: #333;
            border-radius: 5px;
            transition: transform 0.3s ease-in-out;
        }

        .livro img {
            width: 100%;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .livro h3 {
            margin: 10px;
            font-size: 16px;
        }

        .livro p {
            font-size: 14px;
            margin: 5px;
        }

        .botao-emprestar,
        .botao-devolver {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .livro[data-destaque="true"] {
            border: 3px solid #e50914;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
            transform: scale(1.02);
            transition: all 0.3s ease-in-out;
            background-color: rgba(255, 0, 0, 0.05);
        }

        /* Estilo adicional */
        .livro .dias-restantes {
            font-size: 12px;
            color: yellow;
        }

        .livro .estoque-esgotado {
            color: red;
        }
    </style>
</head>
<body>

<header>
    <h1>Bookflix</h1>
</header>

<div id="livros-container" class="livros-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

<script>
    // Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBDx8P3EBS_PxulDBGLG03JYBztx2NsvXY",
        authDomain: "bookflix-72bf6.firebaseapp.com",
        databaseURL: "https://bookflix-72bf6-default-rtdb.firebaseio.com",
        projectId: "bookflix-72bf6",
        storageBucket: "bookflix-72bf6.firebasestorage.app",
        messagingSenderId: "942375721594",
        appId: "1:942375721594:web:95fcf3c05e5b7aeb3279c3"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Adicionar estilo dinâmico para livros destacados
    const estilo = document.createElement("style");
    estilo.textContent = `
        .livro[data-destaque="true"] {
            border: 3px solid #e50914;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
            transform: scale(1.02);
            transition: all 0.3s ease-in-out;
            background-color: rgba(255, 0, 0, 0.05);
        }
    `;
    document.head.appendChild(estilo);

    // Função para exibir os livros
    function exibirLivros() {
        const livrosContainer = document.getElementById("livros-container");
        db.collection("livros").get().then((querySnapshot) => {
            querySnapshot.forEach((doc) => {
                const livro = doc.data();
                const divLivro = document.createElement("div");
                divLivro.classList.add("livro");
                divLivro.setAttribute("data-id", doc.id);
                divLivro.setAttribute("data-destaque", livro.destaque ? "true" : "false");

                divLivro.innerHTML = `
                    <img src="${livro.capa}" alt="${livro.titulo}">
                    <h3>${livro.titulo}</h3>
                    <p>${livro.autor}</p>
                    <p>${livro.sinopse}</p>
                    <div class="estoque">${livro.estoque > 0 ? `Estoque: ${livro.estoque}` : `<span class="estoque-esgotado">Esgotado</span>`}</div>
                    <button class="botao-emprestar" ${livro.estoque > 0 ? "" : "disabled"}>Emprestar</button>
                    <button class="botao-devolver" style="display:none;">Devolver</button>
                    <div class="dias-restantes" style="display:none;">Dias restantes: 15</div>
                `;

                // Ações do botão de emprestar
                const botaoEmprestar = divLivro.querySelector(".botao-emprestar");
                const botaoDevolver = divLivro.querySelector(".botao-devolver");
                const diasRestantes = divLivro.querySelector(".dias-restantes");

                botaoEmprestar.addEventListener("click", () => {
                    db.collection("livros").doc(doc.id).update({
                        estoque: livro.estoque - 1
                    }).then(() => {
                        botaoEmprestar.disabled = true;
                        botaoDevolver.style.display = "inline-block";
                        diasRestantes.style.display = "inline-block";
                    });
                });

                // Ações do botão de devolver
                botaoDevolver.addEventListener("click", () => {
                    db.collection("livros").doc(doc.id).update({
                        estoque: livro.estoque + 1
                    }).then(() => {
                        botaoEmprestar.disabled = false;
                        botaoDevolver.style.display = "none";
                        diasRestantes.style.display = "none";
                    });
                });

                livrosContainer.appendChild(divLivro);
            });
        });
    }

    // Exibir livros ao carregar a página
    exibirLivros();
</script>

</body>
</html>
