<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bookflix</title>
  <style>
    /* Estilo geral com vibe Netflix */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #141414;
      color: #fff;
    }

    header {
      background-color: #111;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header img {
      height: 50px;
    }

    .container {
      padding: 20px;
    }

    .form-container, .book-section {
      display: none;
      margin-top: 20px;
    }

    .form-container.active, .book-section.active {
      display: block;
    }

    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      border: none;
      border-radius: 5px;
      width: 100%;
      max-width: 300px;
    }

    button {
      background-color: #e50914;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #f40612;
    }

    .book-row {
      display: flex;
      overflow-x: auto;
      padding: 20px 0;
      gap: 20px;
    }

    .book-card {
      min-width: 200px;
      background-color: #222;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .book-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #e50914;
    }

    .book-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 10px;
      transition: opacity 0.5s ease-in;
    }

    .book-info {
      margin-top: 10px;
    }

    .highlight {
      border: 2px solid yellow;
    }

    .warning {
      color: orange;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <img src="imagens/logobookflix.jpeg" alt="Logo Bookflix">
    <button onclick="logout()">Sair</button>
  </header>

  <div class="container">
    <!-- Tela de Login -->
    <div id="login-section" class="form-container active">
      <h2>Login</h2>
      <input type="text" id="loginNome" placeholder="Nome completo">
      <input type="date" id="loginDataNascimento">
      <select id="loginTipo">
        <option value="">Selecione o tipo</option>
        <option value="aluno">Aluno</option>
        <option value="professor">Professor</option>
        <option value="admin">Administrador</option>
      </select>
      <button onclick="fazerLogin()">Entrar</button>
      <p>Ainda não tem conta? <a href="#" onclick="mostrarCadastro()">Cadastre-se</a></p>
    </div>

    <!-- Tela de Cadastro -->
    <div id="cadastro-section" class="form-container">
      <h2>Cadastro</h2>
      <input type="text" id="cadNome" placeholder="Nome completo">
      <input type="date" id="cadNascimento">
      <select id="cadTipo" onchange="mostrarCamposExtras()">
        <option value="">Tipo de usuário</option>
        <option value="aluno">Aluno</option>
        <option value="professor">Professor</option>
        <option value="admin">Administrador</option>
      </select>
      <input type="text" id="campoExtra" placeholder="Extra">
      <button onclick="cadastrar()">Cadastrar</button>
      <p>Já tem conta? <a href="#" onclick="mostrarLogin()">Fazer login</a></p>
    </div>

    <!-- Vitrine de livros -->
    <div id="livros-section" class="book-section">
      <h2>Vitrine de Livros</h2>
      <div class="book-row" id="livrosContainer">
        <!-- Livros serão inseridos aqui -->
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBDx8P3EBS_PxulDBGLG03JYBztx2NsvXY",
      authDomain: "bookflix-72bf6.firebaseapp.com",
      databaseURL: "https://bookflix-72bf6-default-rtdb.firebaseio.com",
      projectId: "bookflix-72bf6",
      storageBucket: "bookflix-72bf6.firebasestorage.app",
      messagingSenderId: "942375721594",
      appId: "1:942375721594:web:95fcf3c05e5b7aeb3279c3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Mostrar seções
    function mostrarCadastro() {
      document.getElementById('login-section').classList.remove('active');
      document.getElementById('cadastro-section').classList.add('active');
    }

    function mostrarLogin() {
      document.getElementById('cadastro-section').classList.remove('active');
      document.getElementById('login-section').classList.add('active');
    }

    function mostrarCamposExtras() {
      const tipo = document.getElementById('cadTipo').value;
      const campo = document.getElementById('campoExtra');
      if (tipo === "aluno") campo.placeholder = "Turma";
      else if (tipo === "professor") campo.placeholder = "Disciplina";
      else if (tipo === "admin") campo.placeholder = "Senha do cargo";
      campo.style.display = tipo ? 'block' : 'none';
    }

    // Cadastro
    async function cadastrar() {
      const nome = document.getElementById('cadNome').value;
      const nascimento = document.getElementById('cadNascimento').value;
      const tipo = document.getElementById('cadTipo').value;
      const extra = document.getElementById('campoExtra').value;

      if (!nome || !nascimento || !tipo) {
        alert("Preencha todos os campos.");
        return;
      }

      const senha = tipo === "admin" ? extra : nascimento;

      await db.collection("usuarios").add({
        nome, nascimento, tipo, senha, extra
      });

      alert("Cadastro realizado com sucesso!");
      mostrarLogin();
    }

    // Login
    async function fazerLogin() {
      const nome = document.getElementById('loginNome').value;
      const nascimento = document.getElementById('loginDataNascimento').value;
      const tipo = document.getElementById('loginTipo').value;

      if (!nome || !nascimento || !tipo) {
        alert("Preencha todos os campos!");
        return;
      }

      const senha = tipo === "admin" ? tipo : nascimento;

      const query = await db.collection("usuarios")
        .where("nome", "==", nome)
        .where("senha", "==", senha)
        .where("tipo", "==", tipo)
        .get();

      if (!query.empty) {
        document.getElementById("login-section").classList.remove("active");
        document.getElementById("livros-section").classList.add("active");
        carregarLivros();
      } else {
        alert("Usuário não encontrado ou dados incorretos.");
      }
    }

    // Carregar livros
    async function carregarLivros() {
      const container = document.getElementById("livrosContainer");
      container.innerHTML = "";

      const livros = await db.collection("livros").get();
      livros.forEach(doc => {
        const livro = doc.data();
        const div = document.createElement("div");
        div.classList.add("book-card");
        if (livro.destaque) div.classList.add("highlight");

        div.innerHTML = `
          <img src="${livro.capa}" alt="${livro.nome}">
          <div class="book-info">
            <h4>${livro.nome}</h4>
            <p><strong>Autor:</strong> ${livro.autor}</p>
            <p>${livro.sinopse}</p>
            <p><strong>Estoque:</strong> ${livro.estoque}</p>
            <button onclick="emprestar('${doc.id}', ${livro.estoque})">Emprestar</button>
            <button onclick="devolver('${doc.id}', ${livro.estoque})">Devolver</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Emprestar livro
    async function emprestar(id, estoque) {
      if (estoque <= 0) {
        alert("Livro esgotado!");
        return;
      }
      await db.collection("livros").doc(id).update({
        estoque: estoque - 1
      });
      carregarLivros();
    }

    // Devolver livro
    async function devolver(id, estoque) {
      await db.collection("livros").doc(id).update({
        estoque: estoque + 1
      });
      carregarLivros();
    }

    function logout() {
      location.reload();
    }
  </script>
</body>
</html>
