<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookflix</title>
  <style>
    body {
      margin: 0;
      background-color: #141414;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #000;
      padding: 10px 20px;
    }

    header img {
      height: 40px;
    }

    main {
      padding: 20px;
    }

    h2.titulo-discreto {
      font-size: 16px;
      color: #ccc;
      font-weight: normal;
      margin-bottom: 10px;
    }

    form {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: 20px auto;
    }

    form input,
    form select {
      padding: 14px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 12px;
      border: none;
      border-radius: 8px;
    }

    form button {
      padding: 12px;
      width: 100%;
      background-color: #e50914;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .vitrine {
      overflow-x: auto;
      white-space: nowrap;
      padding: 20px 0;
    }

    .livro {
      display: inline-block;
      background-color: #222;
      margin: 0 10px;
      border-radius: 10px;
      padding: 10px;
      width: 150px;
      vertical-align: top;
      transition: transform 0.3s;
    }

    .livro:hover {
      transform: scale(1.1);
    }

    .livro img {
      width: 100%;
      height: 220px;
      border-radius: 10px;
    }

    .livro p {
      font-size: 14px;
      margin: 10px 0;
    }

    .livro button {
      padding: 8px;
      background-color: #e50914;
      border: none;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
    }

    #livrosVitrine {
      margin-top: 20px;
    }

    #logoutBtn {
      margin-top: 20px;
      padding: 12px;
      background-color: #e50914;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Responsividade para dispositivos móveis */
    @media (max-width: 768px) {
      .vitrine {
        padding: 10px;
      }

      .livro {
        width: 120px;
        margin: 5px;
      }

      form input,
      form select,
      form button {
        font-size: 14px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="imagens/logobookflix.jpeg" alt="Bookflix Logo" />
  </header>

  <main id="loginSection">
    <h2 class="titulo-discreto">Login</h2>
    <form id="loginForm">
      <input type="text" id="loginName" placeholder="Nome completo" required />
      <input type="date" id="loginDob" required />
      <select id="loginType" required>
        <option value="">Selecione o tipo</option>
        <option value="aluno">Aluno</option>
        <option value="professor">Professor</option>
      </select>
      <button type="submit">Entrar</button>
    </form>
    <div id="loginError" style="color: red; text-align: center;"></div>
  </main>

  <main id="vitrineSection" style="display: none;">
    <h2 class="titulo-discreto">Vitrine de Livros</h2>
    <div class="vitrine" id="livrosVitrine"></div>
    <button id="logoutBtn" onclick="logout()">Sair</button>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBDx8P3EBS_PxulDBGLG03JYBztx2NsvXY",
      authDomain: "bookflix-72bf6.firebaseapp.com",
      projectId: "bookflix-72bf6",
      storageBucket: "bookflix-72bf6.appspot.com",
      messagingSenderId: "942375721594",
      appId: "1:942375721594:web:95fcf3c05e5b7aeb3279c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('loginName').value.trim().toLowerCase().replace(/\s+/g, '');
      const dob = document.getElementById('loginDob').value;
      const type = document.getElementById('loginType').value;

      const email = name + '@bookflix.com';
      const password = dob;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('vitrineSection').style.display = 'block';
        loadBooks();
      } catch (error) {
        document.getElementById('loginError').innerText = 'Erro ao entrar: ' + error.message;
      }
    });

    async function loadBooks() {
      const livrosRef = collection(db, 'livros');
      const snapshot = await getDocs(livrosRef);
      const livrosContainer = document.getElementById('livrosVitrine');
      livrosContainer.innerHTML = '';

      snapshot.forEach((doc) => {
        const livro = doc.data();
        const livroDiv = document.createElement('div');
        livroDiv.className = 'livro';
        livroDiv.innerHTML = `
          <img src="${livro.capa}" alt="${livro.nome}" />
          <p>${livro.nome}</p>
          <button>Emprestar</button>
        `;
        livrosContainer.appendChild(livroDiv);
      });
    }

    function logout() {
      auth.signOut().then(() => {
        document.getElementById('vitrineSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
      }).catch((error) => {
        console.log("Erro ao sair: ", error);
      });
    }
  </script>
</body>
</html>
